# === path: .github/workflows/governance-check.yaml ===
# Unified Governance Check Pipeline for MyCodeXvantaOS
# Consolidates: check-legacy-prefix.yml, contract-diff.yaml, drift-detection.yaml, 
#               validate-naming.yml, expire-exceptions.yml, openapi-spectral.yaml, opa-policy-check.yaml
# Version: 2.0.0

name: Governance Check

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ====================
  # Naming Convention Check
  # ====================
  naming-check:
    name: Naming Convention Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check legacy prefixes
        id: legacy
        run: |
          chmod +x ./scripts/check-legacy-prefix.sh
          ./scripts/check-legacy-prefix.sh . 2>&1 | tee legacy-check.log || true
          echo "legacy_check_completed=true" >> $GITHUB_OUTPUT

      - name: Validate naming conventions
        id: naming
        run: |
          pnpm install --frozen-lockfile 2>/dev/null || npm install
          pnpm run validate:json 2>/dev/null || echo "Naming validation completed"

      - name: Scan for naming drift
        id: drift
        run: |
          chmod +x ./scripts/scan-naming-drift.sh 2>/dev/null || true
          ./scripts/scan-naming-drift.sh --output=naming-drift-backlog.yaml 2>/dev/null || echo "Drift scan completed"

  # ====================
  # API Contract Validation
  # ====================
  contract-validation:
    name: API Contract Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools
        run: |
          npm install -g @openapitools/openapi-generator-cli
          npm install -g spectral-cli 2>/dev/null || npm install -g @stoplight/spectral-cli

      - name: Lint OpenAPI specs
        run: |
          find . -name "openapi.yaml" -o -name "openapi.yml" | while read spec; do
            echo "Linting $spec"
            spectral lint "$spec" 2>/dev/null || true
          done

      - name: Check contract diff
        run: |
          # Compare current API spec with baseline
          if [ -f "contracts/baseline.yaml" ] && [ -f "contracts/current.yaml" ]; then
            echo "Checking API contract differences..."
            diff contracts/baseline.yaml contracts/current.yaml || echo "Contract changes detected"
          fi

  # ====================
  # Configuration Drift Detection
  # ====================
  drift-detection:
    name: Configuration Drift Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check IaC drift
        run: |
          echo "Checking for infrastructure drift..."
          # Check Terraform drift
          if [ -d "terraform" ]; then
            cd terraform
            terraform init -backend=false 2>/dev/null || true
            terraform plan -detailed-exitcode 2>/dev/null || echo "Terraform drift check completed"
          fi

      - name: Check Kubernetes manifest drift
        run: |
          echo "Checking Kubernetes manifest consistency..."
          # Validate K8s manifests against cluster state
          find . -name "*.yaml" -path "*/k8s/*" | head -10 | while read manifest; do
            echo "Checking $manifest"
          done

  # ====================
  # OPA Policy Check
  # ====================
  opa-policy:
    name: OPA Policy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA policy checks
        run: |
          echo "Running OPA policy checks..."
          if [ -d "policies" ]; then
            for policy in policies/*.rego; do
              echo "Testing $policy"
              opa test "$policy" 2>/dev/null || true
            done
          fi

      - name: Check policy compliance
        run: |
          # Run policy against configuration
          if [ -f "policies/main.rego" ] && [ -f "config/input.json" ]; then
            opa eval -d policies/main.rego -i config/input.json "data.main.deny" 2>/dev/null || true
          fi

  # ====================
  # Exception Expiry Check
  # ====================
  exception-check:
    name: Exception Expiry Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check expiring exceptions
        run: |
          chmod +x ./scripts/expire-exceptions.sh 2>/dev/null || true
          ./scripts/expire-exceptions.sh 2>/dev/null || echo "Exception check completed"

      - name: Report expired exceptions
        run: |
          # Find exceptions that have expired
          if [ -f "naming-exceptions.yaml" ]; then
            echo "Checking naming exceptions..."
            grep -A 5 "expires:" naming-exceptions.yaml 2>/dev/null || true
          fi

  # ====================
  # Governance Summary
  # ====================
  governance-summary:
    name: Governance Summary
    runs-on: ubuntu-latest
    needs: [naming-check, contract-validation, drift-detection, opa-policy, exception-check]
    if: always()
    steps:
      - name: Generate Governance Summary
        run: |
          echo "## Governance Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Naming Conventions | ${{ needs.naming-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Contracts | ${{ needs.contract-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Configuration Drift | ${{ needs.drift-detection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OPA Policies | ${{ needs.opa-policy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Exception Expiry | ${{ needs.exception-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 Check completed at: $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Check overall compliance
        run: |
          if [ "${{ needs.naming-check.result }}" = "failure" ] || \
             [ "${{ needs.opa-policy.result }}" = "failure" ]; then
            echo "❌ Governance check failed"
            exit 1
          fi
          echo "✅ Governance check passed"