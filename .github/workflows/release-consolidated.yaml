# === path: .github/workflows/release-consolidated.yaml ===
# Unified Release Pipeline for MyCodeXvantaOS
# Consolidates: release.yml, provenance-attest.yaml, sbom-upload.yaml
# Version: 2.0.0

name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: '10'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run test:coverage || true
          pnpm run build:packages || true
          pnpm run build:modules || true

  container:
    name: Build Container
    runs-on: ubuntu-latest
    needs: [prepare, build]
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag }}
          provenance: true
          sbom: true

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [prepare, container]
    steps:
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Generate SBOM
        run: |
          syft packages docker://ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag }} \
            -o spdx-json=sbom-spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-spdx.json

  provenance:
    name: Generate Provenance
    runs-on: ubuntu-latest
    needs: [prepare, container]
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Generate attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ needs.container.outputs.digest }}
          push-to-registry: true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build, container, sbom]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}