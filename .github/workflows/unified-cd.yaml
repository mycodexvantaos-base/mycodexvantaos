# === path: .github/workflows/unified-cd.yaml ===
# Unified CD Pipeline for MyCodeXvantaOS
# Consolidates: cd.yml, cd-dev.yaml
# Version: 2.0.0

name: Unified CD Pipeline

on:
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      version:
        description: 'Version to deploy (leave empty for latest)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'development' }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ====================
  # Stage 1: Prepare
  # ====================
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            VERSION="v$(date +%Y%m%d)-${{ github.sha }}"
          else
            VERSION="${{ github.ref_name }}-${{ github.sha }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Check deployment conditions
        id: check
        run: |
          # Check if there are changes to deploy
          if git diff --quiet HEAD~1 HEAD -- 2>/dev/null; then
            echo "No changes detected"
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected, proceeding with deployment"
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          fi

  # ====================
  # Stage 2: Build Artifacts
  # ====================
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_deploy == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: ${{ env.REGISTRY }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:packages

      - name: Build modules
        run: pnpm run build:modules

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            modules/*/dist
          retention-days: 7

  # ====================
  # Stage 3: Build & Push Container Images
  # ====================
  container-build:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: ${{ needs.prepare.outputs.should_deploy == 'true' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=${{ needs.prepare.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ====================
  # Stage 4: Deploy to Development
  # ====================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [prepare, container-build]
    if: ${{ github.event.inputs.environment == 'development' || github.ref == 'refs/heads/main' }}
    environment:
      name: development
      url: https://dev.mycodexvantaos.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > ~/.kube/config

      - name: Deploy with kubectl
        run: |
          kubectl set image deployment/mycodexvantaos \
            mycodexvantaos=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }} \
            -n development

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/mycodexvantaos -n development --timeout=300s

      - name: Run smoke tests
        run: |
          # Basic health check
          kubectl exec -n development deployment/mycodexvantaos -- curl -f http://localhost:8080/health || exit 1

  # ====================
  # Stage 5: Deploy to Staging
  # ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, container-build, deploy-dev]
    if: ${{ github.event.inputs.environment == 'staging' }}
    environment:
      name: staging
      url: https://staging.mycodexvantaos.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with kubectl
        run: |
          kubectl set image deployment/mycodexvantaos \
            mycodexvantaos=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }} \
            -n staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/mycodexvantaos -n staging --timeout=300s

  # ====================
  # Stage 6: Deploy to Production (with freeze-gate)
  # ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, container-build, deploy-staging]
    if: ${{ github.event.inputs.environment == 'production' }}
    environment:
      name: production
      url: https://mycodexvantaos.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check freeze gate
        id: freeze-check
        run: |
          # Check if deployment is frozen
          if [ -f ".freeze" ]; then
            echo "⚠️ Deployment is frozen"
            echo "frozen=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "frozen=false" >> $GITHUB_OUTPUT

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy with canary strategy
        run: |
          # Deploy canary (10% traffic)
          kubectl apply -f k8s/production-canary.yaml
          kubectl set image deployment/mycodexvantaos-canary \
            mycodexvantaos=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }} \
            -n production

          # Wait and monitor
          sleep 60

          # Promote to full deployment if healthy
          kubectl set image deployment/mycodexvantaos \
            mycodexvantaos=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }} \
            -n production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/mycodexvantaos -n production --timeout=600s

      - name: Create deployment record
        run: |
          echo "Deployed version ${{ needs.prepare.outputs.version }} to production" >> deployment.log
          date >> deployment.log

  # ====================
  # Stage 7: Post-Deployment
  # ====================
  post-deploy:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: [prepare, deploy-dev, deploy-staging, deploy-production]
    if: always() && needs.prepare.outputs.should_deploy == 'true'
    steps:
      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Development | ${{ needs.deploy-dev.result }} | ${{ needs.prepare.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.deploy-staging.result }} | ${{ needs.prepare.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.deploy-production.result }} | ${{ needs.prepare.outputs.version }} |" >> $GITHUB_STEP_SUMMARY