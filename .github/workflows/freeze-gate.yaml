name: Deployment Freeze Gate

on:
  workflow_run:
    workflows: ["Deploy to Development", "Deploy to Staging", "Deploy to Production"] # Add your deployment workflow names
    types:
      - requested

permissions:
  actions: write

jobs:
  check-freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Check for deployment freeze
        id: freeze_check
        run: |
          # This script would contain logic to check a central configuration
          # (e.g., .root.governance.yaml) for freeze windows.
          # For this example, we'll simulate a freeze.
          FREEZE_ACTIVE="false"
          CURRENT_DATE=$(date -u +%Y-%m-%d)

          # Example Freeze Window (from .root.governance.yaml)
          FREEZE_START="2024-12-15"
          FREEZE_END="2025-01-10"

          if [[ "$CURRENT_DATE" > "$FREEZE_START" ]] && [[ "$CURRENT_DATE" < "$FREEZE_END" ]]; then
            FREEZE_ACTIVE="true"
          fi

          if [[ "$FREEZE_ACTIVE" == "true" ]]; then
            echo "::error::Deployment freeze is active! Deployments are currently blocked."
            exit 1
          else
            echo "Deployment freeze is not active. Proceeding."
          fi

      - name: Cancel workflow run
        if: failure()
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          workflow_id: ${{ github.event.workflow_run.id }}
          token: ${{ secrets.GITHUB_TOKEN }}
