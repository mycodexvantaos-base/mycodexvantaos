# .github/workflows/check-legacy-prefix.yml
# Standalone workflow to scan for forbidden legacy prefixes.
# Based on naming-spec-v1.md 4, Appendix B.4

name: Check Legacy Prefixes

on:
  pull_request:
    paths:
      - "services/**"
      - "modules/**"
      - "packages/**"
      - "providers/**"
      - "infra/**"
  workflow_dispatch:

jobs:
  check:
    name: Forbidden Prefix Scan (4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for mycodexvanta-os / codexvanta / codexvanta-os
        run: ./scripts/check-legacy-prefix.sh .
