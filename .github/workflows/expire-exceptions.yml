# .github/workflows/expire-exceptions.yml
# Weekly scheduled job to check for expiring/expired naming exceptions.
# Based on naming-spec-v1.md 15.2, Appendix B.8

name: Exception Expiry Check

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  check-expiry:
    name: Check Exception Expiry (15.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check exception expiry status
        id: expiry
        run: ./scripts/expire-exceptions.sh
        continue-on-error: true

      - name: Create issue if expired exceptions found
        if: steps.expiry.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'ACTION REQUIRED: Naming exceptions require renewal or removal';
            const body = `
            ## Naming Exception Expiry Alert

            One or more naming exceptions in \`governance/exceptions.yaml\` have expired
            or are expiring within 30 days.

            **Action Required:**
            1. Review \`governance/exceptions.yaml\`
            2. For each expired exception:
               - If the naming violation has been fixed: set \`status: revoked\`
               - If still needed: renew with a new \`expiresAt\` and architecture committee approval
            3. Run \`./scripts/expire-exceptions.sh\` to verify

            See naming-spec-v1.md 15.2 for policy details.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['governance', 'naming-compliance'],
            });
