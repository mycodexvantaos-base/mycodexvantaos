# .github/workflows/validate-naming.yml
# CI naming validation workflow for mycodexvantaos platform.
# Based on naming-spec-v1.md 14
#
# Runs on every pull request and push to main.
# Hard enforcement failures block merge.

name: Validate Naming

on:
  pull_request:
    branches: [main, "release/**"]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-legacy-prefix:
    name: Check Forbidden Legacy Prefixes (4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run legacy prefix check
        run: ./scripts/check-legacy-prefix.sh .
        # Hard enforcement — step failure blocks workflow

  validate-architecture:
    name: Validate Architecture Naming (14)
    runs-on: ubuntu-latest
    needs: check-legacy-prefix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run naming validator (hard enforcement)
        run: npx ts-node ci/validate-architecture.ts --reporter=github
        env:
          # ts-node configuration
          TS_NODE_PROJECT: tsconfig.base.json

      - name: Run naming validator (soft warnings)
        run: npx ts-node ci/validate-architecture.ts --reporter=github --fail-on-soft || true
        # Soft warnings are reported but do not block merge

  validate-manifests:
    name: Validate Module Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      - name: Validate module manifests against schema
        run: |
          SCHEMA="schemas/service-manifest.schema.json"
          ERRORS=0
          for MANIFEST in modules/*/module-manifest.yaml; do
            if ! ajv validate -s "$SCHEMA" -d "$MANIFEST" --spec=draft7 2>/dev/null; then
              echo "::error file=${MANIFEST}::Schema validation failed"
              ERRORS=$((ERRORS + 1))
            fi
          done
          [ $ERRORS -eq 0 ] && echo "All manifests valid." || exit 1

  check-exceptions-expiry:
    name: Check Exception Expiry (15.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for expired exceptions
        run: ./scripts/expire-exceptions.sh --notify-only || true
        # Expired exceptions emit warnings but do not block merge
        # Architecture committee is notified separately
