# === path: .github/workflows/unified-ci.yaml ===
# Unified CI Pipeline for MyCodeXvantaOS
# Consolidates: ci.yml, ci.yaml, ci-cd.yml, testing.yml
# Version: 2.0.0

name: Unified CI Pipeline

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: write
  checks: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  GO_VERSION: '1.21'

jobs:
  # ====================
  # Stage 1: Code Quality
  # ====================
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint || true

      - name: Check Prettier formatting
        run: pnpm run format:check || true

      - name: TypeScript type check
        run: pnpm run typecheck

  # ====================
  # Stage 2: Architecture Validation
  # ====================
  validate-architecture:
    name: Architecture Validation
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate architecture compliance
        run: pnpm run validate:github

      - name: Check naming conventions
        run: pnpm run check-legacy || true

      - name: Scan for naming drift
        run: pnpm run scan-drift || true

  # ====================
  # Stage 3: Build
  # ====================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate-architecture
    strategy:
      matrix:
        target: [packages, modules]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" = "packages" ]; then
            pnpm run build:packages
          else
            pnpm run build:modules
          fi

  # ====================
  # Stage 4: Test
  # ====================
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ====================
  # Stage 5: Module Tests
  # ====================
  test-modules:
    name: Module Tests
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    strategy:
      matrix:
        module:
          - mycodexvantaos-ai-team-orchestrator
          - mycodexvantaos-persona-engine
          - mycodexvantaos-agent-toolkit
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run module tests
        run: pnpm run test:modules --testPathPattern='${{ matrix.module }}'

  # ====================
  # Stage 6: Service Tests
  # ====================
  test-services:
    name: Service Tests
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run service tests
        run: pnpm run test:services

  # ====================
  # Stage 7: CI Summary
  # ====================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-format, validate-architecture, build, test, test-modules, test-services]
    if: always()
    steps:
      - name: Check overall status
        run: |
          if [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.test-modules.result }}" = "failure" ] || \
             [ "${{ needs.test-services.result }}" = "failure" ]; then
            echo "❌ CI Pipeline failed"
            exit 1
          fi
          echo "✅ CI Pipeline passed"

      - name: Create summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint-and-format.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | ${{ needs.validate-architecture.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Module Tests | ${{ needs.test-modules.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Service Tests | ${{ needs.test-services.result }} |" >> $GITHUB_STEP_SUMMARY