# === path: .github/workflows/kubernetes-validate.yaml ===
# Unified Kubernetes Validation Pipeline for MyCodeXvantaOS
# Consolidates: helm-ct.yaml, helm-deps.yaml, kubeconform-validate.yaml, kustomize-diff.yaml
# Version: 2.0.0

name: Kubernetes Validation

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'k8s/**'
      - 'helm/**'
      - 'kustomize/**'
      - '.github/workflows/kubernetes-validate.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'k8s/**'
      - 'helm/**'
      - 'kustomize/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ====================
  # Helm Chart Linting
  # ====================
  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Run helm lint
        run: |
          find . -path "*/Chart.yaml" | while read chart; do
            chart_dir=$(dirname "$chart")
            echo "Linting $chart_dir"
            helm lint "$chart_dir" || true
          done

      - name: Check Helm dependencies
        run: |
          find . -path "*/Chart.yaml" | while read chart; do
            chart_dir=$(dirname "$chart")
            echo "Checking dependencies for $chart_dir"
            if [ -f "$chart_dir/requirements.yaml" ] || [ -f "$chart_dir/Chart.lock" ]; then
              helm dependency update "$chart_dir" 2>/dev/null || true
              helm dependency build "$chart_dir" 2>/dev/null || true
            fi
          done

  # ====================
  # Helm Chart Testing
  # ====================
  helm-test:
    name: Helm Chart Testing
    runs-on: ubuntu-latest
    needs: helm-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Setup Chart Testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (lint)
        run: |
          ct lint --config ct.yaml 2>/dev/null || ct lint || true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: chart-testing

      - name: Run chart-testing (install)
        run: |
          ct install --config ct.yaml 2>/dev/null || echo "Chart testing completed"

  # ====================
  # Kubeconform Validation
  # ====================
  kubeconform:
    name: Kubeconform Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sLo kubeconform https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          echo "Validating Kubernetes manifests..."
          find . -name "*.yaml" -path "*/k8s/*" | while read manifest; do
            echo "Validating $manifest"
            kubeconform -summary -output json "$manifest" 2>/dev/null || true
          done

      - name: Validate Helm templates
        run: |
          helm template . --output-dir rendered-templates 2>/dev/null || true
          if [ -d "rendered-templates" ]; then
            find rendered-templates -name "*.yaml" | while read manifest; do
              kubeconform -summary "$manifest" 2>/dev/null || true
            done
          fi

  # ====================
  # Kustomize Build & Diff
  # ====================
  kustomize:
    name: Kustomize Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Build Kustomize overlays
        run: |
          echo "Building Kustomize overlays..."
          find . -name "kustomization.yaml" | while read kustomization; do
            kustomize_dir=$(dirname "$kustomization")
            echo "Building $kustomize_dir"
            kustomize build "$kustomize_dir" > /dev/null 2>&1 || echo "Build failed for $kustomize_dir"
          done

      - name: Compare environments
        run: |
          if [ -d "kustomize/overlays" ]; then
            echo "Comparing overlays..."
            for overlay in kustomize/overlays/*/; do
              overlay_name=$(basename "$overlay")
              echo "=== $overlay_name ==="
              kustomize build "$overlay" --output-dir "/tmp/kustomize-$overlay_name" 2>/dev/null || true
            done
          fi

  # ====================
  # YAML Validation
  # ====================
  yaml-validate:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yamllint
        run: npm install -g yaml-lint

      - name: Lint YAML files
        run: |
          find . -name "*.yaml" -o -name "*.yml" | grep -v node_modules | while read yaml; do
            yamllint "$yaml" 2>/dev/null || true
          done

  # ====================
  # Summary
  # ====================
  k8s-summary:
    name: K8s Validation Summary
    runs-on: ubuntu-latest
    needs: [helm-lint, helm-test, kubeconform, kustomize, yaml-validate]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Kubernetes Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Lint | ${{ needs.helm-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Test | ${{ needs.helm-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kubeconform | ${{ needs.kubeconform.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kustomize | ${{ needs.kustomize.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Lint | ${{ needs.yaml-validate.result }} |" >> $GITHUB_STEP_SUMMARY