name: Continuous Deployment

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  REGISTRY: ghcr.io

jobs:
  # ===========================================
  # Version & Release
  # ===========================================
  version:
    name: "🏷️ Version"
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  # ===========================================
  # Build Docker Images
  # ===========================================
  build-images:
    name: "🐳 Build Docker Images"
    runs-on: ubuntu-latest
    needs: version
    if: always()
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        package:
          - name: core-kernel
            path: packages/mycodexvantaos-core-kernel
          - name: namespaces-sdk
            path: packages/mycodexvantaos-namespaces-sdk
          - name: taxonomy-core
            path: packages/mycodexvantaos-taxonomy-core
          - name: ai-embedding
            path: services/mycodexvantaos-ai-embedding
          - name: ai-ensemble
            path: services/mycodexvantaos-ai-ensemble
          - name: data-vector-store
            path: services/mycodexvantaos-data-vector-store
          - name: engine-dag
            path: services/mycodexvantaos-engine-dag
          - name: engine-execution
            path: services/mycodexvantaos-engine-execution
          - name: engine-governance
            path: services/mycodexvantaos-engine-governance
          - name: engine-rag
            path: services/mycodexvantaos-engine-rag

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.package.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile.package
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PACKAGE_PATH=${{ matrix.package.path }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================
  # Publish to npm/GitHub Packages
  # ===========================================
  publish-packages:
    name: "📦 Publish Packages"
    runs-on: ubuntu-latest
    needs: version
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://npm.pkg.github.com"
          scope: "@mycodexvantaos"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish
        run: pnpm -r publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # Deploy to Staging
  # ===========================================
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.mycodexvantaos.io

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          kubectl apply -k infra/kubernetes/overlays/staging/ || echo "Staging deployment manifest not found"

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/mycodexvantaos -n staging --timeout=300s || true

  # ===========================================
  # Deploy to Production
  # ===========================================
  deploy-production:
    name: "🚀 Deploy to Production"
    runs-on: ubuntu-latest
    needs: [version, build-images]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://mycodexvantaos.io

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Deploy to Production
        run: |
          echo "Deploying version ${{ needs.version.outputs.version }} to production..."
          kubectl apply -k infra/kubernetes/overlays/production/ || echo "Production deployment manifest not found"

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/mycodexvantaos -n production --timeout=300s || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            packages/*/dist/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # GitOps Sync (ArgoCD)
  # ===========================================
  gitops-sync:
    name: "🔄 GitOps Sync"
    runs-on: ubuntu-latest
    needs: deploy-production
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Update ArgoCD Manifests
        run: |
          echo "Updating ArgoCD manifests for version ${{ needs.version.outputs.version }}..."

      - name: Commit Update
        run: |
          git config user.name "MyCodexVantaOS CI Bot"
          git config user.email "ci@mycodexvantaos.io"
          git commit -am "chore: update production to v${{ needs.version.outputs.version }}" || echo "No changes"
          git push origin main || true