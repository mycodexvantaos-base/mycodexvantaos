name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type (patch/minor/major) or specific version"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Create prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ===========================================
  # Version Bump
  # ===========================================
  version:
    name: "🏷️ Version Bump"
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure Git
        run: |
          git config user.name "MyCodexVantaOS Release Bot"
          git config user.email "release@mycodexvantaos.io"

      - name: Get Current Version
        id: current
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Bump Version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            NEW_VERSION="${{ github.event.inputs.version }}"
          else
            # Use npm version command for semantic versioning
            NEW_VERSION=$(npm version ${{ github.event.inputs.version }} --no-git-tag-version | tr -d 'v')
          fi
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update Package Versions
        run: |
          # Update all packages to new version
          pnpm -r exec -- npm pkg set version=${{ steps.version.outputs.new-version }}

      - name: Commit Changes
        run: |
          git add -A
          git commit -m "chore(release): v${{ steps.version.outputs.new-version }}"
          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin main --tags

  # ===========================================
  # Create Release
  # ===========================================
  create-release:
    name: "📝 Create Release"
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Generate Changelog
        id: changelog
        uses: orhanson/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip all

      - name: Create GitHub Release
        if: steps.changelog.outputs.content != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (auto-notes fallback)
        if: steps.changelog.outputs.content == ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # Trigger CD Pipeline
  # ===========================================
  trigger-cd:
    name: "🚀 Trigger CD"
    runs-on: ubuntu-latest
    needs: [version, create-release]

    steps:
      - name: Trigger CD Workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd.yml',
              ref: '${{ needs.version.outputs.tag }}'
            })