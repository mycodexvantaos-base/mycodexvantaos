# providers/repo/repo-github/provider-manifest.yaml
# 8.1 — provider instance: repo-github
# 8.2 — capability (repo) precedes provider name (github)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: repo-github
  capability: repo
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: github
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_REPO
  configSchemaRef: ./config.schema.json
  description: "GitHub repository operations provider."
