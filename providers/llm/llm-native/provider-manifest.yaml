# providers/llm/llm-native/provider-manifest.yaml
# Native LLM Provider - Zero external dependency
# Falls back to simple rule-based responses when no external LLM available
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: llm-native
  capability: llm
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: native
  isNative: true
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_LLM_NATIVE
  configSchemaRef: ./config.schema.json
  description: "Native LLM provider with zero external dependencies. Provides basic text processing and template-based responses as fallback."
  capabilities:
    - text-generation
    - text-completion
    - code-assistance
    - summarization
  limitations:
    - No advanced reasoning without external model
    - Template-based responses only
  priority: 100  # Highest priority as fallback