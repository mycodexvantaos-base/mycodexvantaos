# providers/llm/llm-ollama/provider-manifest.yaml
# 8.1 — provider instance: llm-ollama
# 8.2 — capability (llm) precedes provider name (ollama)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: llm-ollama
  capability: llm
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: ollama
  isNative: true
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_LLM_OLLAMA
  configSchemaRef: ./config.schema.json
  description: "Ollama local LLM provider (native, no cloud dependency)."
