# providers/llm/llm-openai/provider-manifest.yaml
# 8.1 — provider instance: llm-openai
# 8.2 — capability (llm) precedes provider name (openai)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: llm-openai
  capability: llm
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: openai
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_LLM
  configSchemaRef: ./config.schema.json
  description: "OpenAI GPT models LLM provider."
