# providers/database/database-postgres/provider-manifest.yaml
# 8.1 — provider instance: database-postgres
# 8.2 — capability (database) precedes provider name (postgres)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: database-postgres
  capability: database
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: postgres
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_DATABASE
  configSchemaRef: ./config.schema.json
  description: "PostgreSQL relational database provider."
