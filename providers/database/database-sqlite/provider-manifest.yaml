# providers/database/database-sqlite/provider-manifest.yaml
# 8.1 — provider instance: database-sqlite
# 8.2 — capability (database) precedes provider name (sqlite)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: database-sqlite
  capability: database
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: sqlite
  isNative: true
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_DATABASE_SQLITE
  configSchemaRef: ./config.schema.json
  description: "SQLite embedded database provider (native, no external dependency)."
