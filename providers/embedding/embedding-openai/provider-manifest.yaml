# providers/embedding/embedding-openai/provider-manifest.yaml
# 8.1 — provider instance: embedding-openai
# 8.2 — capability (embedding) precedes provider name (openai)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: embedding-openai
  capability: embedding
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: openai
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_EMBEDDING
  configSchemaRef: ./config.schema.json
  description: "OpenAI text embedding provider."
