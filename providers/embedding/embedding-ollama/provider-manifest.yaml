# providers/embedding/embedding-ollama/provider-manifest.yaml
# 8.1 — provider instance: embedding-ollama
# 8.2 — capability (embedding) precedes provider name (ollama)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: embedding-ollama
  capability: embedding
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: ollama
  isNative: true
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_EMBEDDING_OLLAMA
  configSchemaRef: ./config.schema.json
  description: "Ollama local embedding provider (native, no cloud dependency)."
