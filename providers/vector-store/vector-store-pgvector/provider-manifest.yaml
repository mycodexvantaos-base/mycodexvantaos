# providers/vector-store/vector-store-pgvector/provider-manifest.yaml
# 8.1 — provider instance: vector-store-pgvector
# 8.2 — capability (vector-store) precedes provider name (pgvector)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: vector-store-pgvector
  capability: vector-store
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: pgvector
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_VECTOR_STORE
  configSchemaRef: ./config.schema.json
  description: "pgvector PostgreSQL extension as the vector-store provider."
