# providers/blockchain/blockchain-hyperledger/provider-manifest.yaml
# 8.1 — provider instance: blockchain-hyperledger
# 8.2 — capability (blockchain) precedes provider name (hyperledger)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: blockchain-hyperledger
  capability: blockchain
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: hyperledger
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_BLOCKCHAIN
  configSchemaRef: ./config.schema.json
  description: "Hyperledger Fabric distributed ledger provider for enterprise smart contract execution and immutable audit trails."