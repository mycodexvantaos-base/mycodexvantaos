# providers/blockchain/blockchain-ethereum/provider-manifest.yaml
# 8.1 — provider instance: blockchain-ethereum
# 8.2 — capability (blockchain) precedes provider name (ethereum)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: blockchain-ethereum
  capability: blockchain
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: ethereum
  isNative: false
  lifecycle:
    stage: beta
  envVarPrefix: MYCODEXVANTAOS_BLOCKCHAIN
  configSchemaRef: ./config.schema.json
  description: "Ethereum-compatible smart contract execution provider for decentralized governance verification and token-based consensus."