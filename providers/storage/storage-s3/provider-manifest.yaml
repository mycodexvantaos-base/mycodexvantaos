# providers/storage/storage-s3/provider-manifest.yaml
# 8.1 — provider instance: storage-s3
# 8.2 — capability (storage) precedes provider name (s3)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: storage-s3
  capability: storage
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: s3
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_STORAGE
  configSchemaRef: ./config.schema.json
  description: "AWS S3 object storage provider."
