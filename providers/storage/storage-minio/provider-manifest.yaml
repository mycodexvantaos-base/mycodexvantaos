# providers/storage/storage-minio/provider-manifest.yaml
# 8.1 — provider instance: storage-minio
# 8.2 — capability (storage) precedes provider name (minio)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: storage-minio
  capability: storage
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: minio
  isNative: true
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_STORAGE_MINIO
  configSchemaRef: ./config.schema.json
  description: "MinIO object storage provider (native, self-hosted)."
