# providers/cache/cache-redis/provider-manifest.yaml
# 8.1 — provider instance: cache-redis
# 8.2 — capability (cache) precedes provider name (redis)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: cache-redis
  capability: cache
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: redis
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_CACHE
  configSchemaRef: ./config.schema.json
  description: "Redis in-memory cache provider."
