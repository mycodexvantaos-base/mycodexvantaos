# providers/security/security-trivy/provider-manifest.yaml
# 8.1 — provider instance: security-trivy
# 8.2 — capability (security) precedes provider name (trivy)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: security-trivy
  capability: security
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: trivy
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_SECURITY
  configSchemaRef: ./config.schema.json
  description: "Trivy vulnerability scanner provider."
