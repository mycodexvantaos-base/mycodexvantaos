# providers/event-stream/event-stream-kafka/provider-manifest.yaml
# 8.1 — provider instance: event-stream-kafka
# 8.2 — capability (event-stream) precedes provider name (kafka)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: event-stream-kafka
  capability: event-stream
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: kafka
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_EVENT_STREAM
  configSchemaRef: ./config.schema.json
  description: "Apache Kafka event streaming provider for high-throughput governance event propagation and closed-loop compliance verification."