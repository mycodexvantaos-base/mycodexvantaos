# providers/event-stream/event-stream-cloudevents/provider-manifest.yaml
# 8.1 — provider instance: event-stream-cloudevents
# 8.2 — capability (event-stream) precedes provider name (cloudevents)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: event-stream-cloudevents
  capability: event-stream
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: cloudevents
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_EVENT_STREAM
  configSchemaRef: ./config.schema.json
  description: "CloudEvents CNCF specification provider for standardized governance event envelope formatting and cross-platform event interoperability."