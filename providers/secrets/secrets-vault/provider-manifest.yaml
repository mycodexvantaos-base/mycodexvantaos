# providers/secrets/secrets-vault/provider-manifest.yaml
# 8.1 — provider instance: secrets-vault
# 8.2 — capability (secrets) precedes provider name (vault)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: secrets-vault
  capability: secrets
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: vault
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_SECRETS
  configSchemaRef: ./config.schema.json
  description: "HashiCorp Vault secrets management provider."
