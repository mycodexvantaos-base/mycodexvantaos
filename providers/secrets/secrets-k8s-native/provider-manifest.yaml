# providers/secrets/secrets-k8s-native/provider-manifest.yaml
# 8.1 — provider instance: secrets-k8s-native
# 8.2 — capability (secrets) precedes provider name (k8s-native)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: secrets-k8s-native
  capability: secrets
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: k8s-native
  isNative: true
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_SECRETS_K8S
  configSchemaRef: ./config.schema.json
  description: "Kubernetes native Secrets provider (no external vault required)."
