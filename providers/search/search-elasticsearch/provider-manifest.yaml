# providers/search/search-elasticsearch/provider-manifest.yaml
# 8.1 — provider instance: search-elasticsearch
# 8.2 — capability (search) precedes provider name (elasticsearch)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: search-elasticsearch
  capability: search
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: elasticsearch
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_SEARCH
  configSchemaRef: ./config.schema.json
  description: "Elasticsearch full-text search provider."
