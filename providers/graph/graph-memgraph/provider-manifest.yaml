# providers/graph/graph-memgraph/provider-manifest.yaml
# 8.1 — provider instance: graph-memgraph
# 8.2 — capability (graph) precedes provider name (memgraph)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: graph-memgraph
  capability: graph
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: memgraph
  isNative: false
  lifecycle:
    stage: beta
  envVarPrefix: MYCODEXVANTAOS_GRAPH_MEMGRAPH
  configSchemaRef: ./config.schema.json
  description: "Memgraph in-memory graph database provider."
