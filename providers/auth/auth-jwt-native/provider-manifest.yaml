# providers/auth/auth-jwt-native/provider-manifest.yaml
# 8.1 — provider instance: auth-jwt-native
# 8.2 — capability (auth) precedes provider name (jwt-native)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: auth-jwt-native
  capability: auth
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: jwt-native
  isNative: true
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_AUTH_JWT
  configSchemaRef: ./config.schema.json
  description: "Native JWT-based authentication provider (no external IdP required)."
