# providers/observability/observability-prometheus/provider-manifest.yaml
# 8.1 — provider instance: observability-prometheus
# 8.2 — capability (observability) precedes provider name (prometheus)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: observability-prometheus
  capability: observability
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: prometheus
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_OBSERVABILITY_PROM
  configSchemaRef: ./config.schema.json
  description: "Prometheus metrics scraping provider."
