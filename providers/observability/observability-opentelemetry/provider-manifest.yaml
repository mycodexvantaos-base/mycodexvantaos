# providers/observability/observability-opentelemetry/provider-manifest.yaml
# 8.1 — provider instance: observability-opentelemetry
# 8.2 — capability (observability) precedes provider name (opentelemetry)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: observability-opentelemetry
  capability: observability
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: opentelemetry
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_OBSERVABILITY
  configSchemaRef: ./config.schema.json
  description: "OpenTelemetry distributed tracing, metrics, and logging provider."
