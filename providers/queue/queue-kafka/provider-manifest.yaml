# providers/queue/queue-kafka/provider-manifest.yaml
# 8.1 — provider instance: queue-kafka
# 8.2 — capability (queue) precedes provider name (kafka)
apiVersion: mycodexvantaos.org/v1
kind: Provider
metadata:
  name: queue-kafka
  capability: queue
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
    mycodexvantaos.org/specRef: "8.1"
spec:
  providerName: kafka
  isNative: false
  lifecycle:
    stage: stable
  envVarPrefix: MYCODEXVANTAOS_QUEUE_KAFKA
  configSchemaRef: ./config.schema.json
  description: "Apache Kafka event streaming provider."
