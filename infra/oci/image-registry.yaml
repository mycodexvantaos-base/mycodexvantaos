# infra/oci/image-registry.yaml
# 7.3 — OCI image registry configuration
apiVersion: mycodexvantaos.org/v1
kind: ImageRegistryConfig
metadata:
  name: platform-image-registry
spec:
  registry: ghcr.io
  namespace: mycodexvantaos
  # Image repository name MUST equal service-id (7.3)
  namingRule: "<registry>/<namespace>/<service-id>:<semver-tag>"
  productionRule: "<registry>/<namespace>/<service-id>@sha256:<digest>"
  digestPinningRequired: true
  environments:
    prod: true    # digest pinning required
    staging: true
    dev: false    # tag-based allowed in dev
