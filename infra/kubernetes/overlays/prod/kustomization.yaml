# infra/kubernetes/overlays/prod/kustomization.yaml
# 12.1 — This overlay sets namespace and environment labels ONLY.
# It MUST NOT rename any resource (no namePrefix/nameSuffix that violates 5.4).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mycodexvantaos-prod

resources:
  - ../../base/mycodexvantaos-core-kernel
  - ../../base/mycodexvantaos-core-auth
  - ../../base/mycodexvantaos-core-gateway
  - ../../base/mycodexvantaos-core-config
  - ../../base/mycodexvantaos-ai-embedding
  - ../../base/mycodexvantaos-ai-llm
  - ../../base/mycodexvantaos-ai-memory
  - ../../base/mycodexvantaos-ai-agent
  - ../../base/mycodexvantaos-data-vector-store
  - ../../base/mycodexvantaos-data-pipeline
  - ../../base/mycodexvantaos-data-graph
  - ../../base/mycodexvantaos-platform-notification
  - ../../base/mycodexvantaos-platform-scheduler
  - ../../base/mycodexvantaos-platform-observability
  - ../../base/mycodexvantaos-security-secrets
  - ../../base/mycodexvantaos-security-validation
  - ../../base/mycodexvantaos-docs-search
  - ../../base/mycodexvantaos-governance-policy

commonLabels:
  mycodexvantaos.org/environment: prod

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/managed-by=mycodexvantaos"
