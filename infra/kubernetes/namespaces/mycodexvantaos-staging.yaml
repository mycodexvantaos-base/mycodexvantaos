# 12.1 — Environment 'staging' appears ONLY in namespace name, never in resource names.
apiVersion: v1
kind: Namespace
metadata:
  name: mycodexvantaos-staging
  labels:
    mycodexvantaos.org/environment: staging
    mycodexvantaos.org/managed-by: naming-spec-v1
