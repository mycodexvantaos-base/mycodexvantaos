apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycodexvantaos-platform-validation
  labels:
    app: mycodexvantaos-platform-validation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mycodexvantaos-platform-validation
  template:
    metadata:
      labels:
        app: mycodexvantaos-platform-validation
    spec:
      containers:
      - name: mycodexvantaos-platform-validation
        image: registry.internal/mycodexvantaos/mycodexvantaos-platform-validation:latest
        ports:
        - containerPort: 8080