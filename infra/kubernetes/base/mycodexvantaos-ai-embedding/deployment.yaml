# infra/kubernetes/base/mycodexvantaos-ai-embedding/deployment.yaml
# 5.4, 6.4 — metadata.name MUST equal the service-id. Namespace set by overlay only (12.1).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycodexvantaos-ai-embedding
  labels:
    app.kubernetes.io/name: mycodexvantaos-ai-embedding
    app.kubernetes.io/managed-by: mycodexvantaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mycodexvantaos-ai-embedding
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mycodexvantaos-ai-embedding
    spec:
      containers:
        - name: mycodexvantaos-ai-embedding
          image: ghcr.io/mycodexvantaos/mycodexvantaos-ai-embedding:latest
          # Production MUST use digest pinning (7.3):
          # image: ghcr.io/mycodexvantaos/mycodexvantaos-ai-embedding@sha256:<digest>
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: mycodexvantaos-ai-embedding
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
