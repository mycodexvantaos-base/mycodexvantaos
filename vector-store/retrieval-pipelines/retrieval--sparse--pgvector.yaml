# vector-store/retrieval-pipelines/retrieval--sparse--pgvector.yaml
# 9.4 — Format: retrieval--<strategy>--<store-type>
apiVersion: mycodexvantaos.org/v1
kind: RetrievalPipeline
metadata:
  name: retrieval--sparse--pgvector
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  strategy: sparse
  storeType: pgvector
  provider: vector-store-pgvector
  # no embeddingModelAlias for sparse pipelines
  topK: 10
  rerankEnabled: false
  description: "Sparse keyword retrieval backed by pgvector."
