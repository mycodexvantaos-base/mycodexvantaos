# vector-store/retrieval-pipelines/retrieval--hybrid--pgvector.yaml
# 9.4 — Format: retrieval--<strategy>--<store-type>
apiVersion: mycodexvantaos.org/v1
kind: RetrievalPipeline
metadata:
  name: retrieval--hybrid--pgvector
  labels:
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  strategy: hybrid
  storeType: pgvector
  provider: vector-store-pgvector
  embeddingModelAlias: openai--text-embedding-3-small--1536d
  topK: 10
  rerankEnabled: true
  description: "Hybrid dense+sparse retrieval with pgvector. Combines semantic and keyword search."
