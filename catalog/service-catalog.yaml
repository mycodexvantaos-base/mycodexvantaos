  - serviceId: mycodexvantaos-docs-search
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-docs-search"
    packageName: "@mycodexvantaos/docs-search"
    domain: docs
    lifecycle: stable

  - serviceId: mycodexvantaos-governance-policy
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-governance-policy"
    packageName: "@mycodexvantaos/governance-policy"
    domain: governance
    lifecycle: stable
