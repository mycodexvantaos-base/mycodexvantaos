  - serviceId: mycodexvantaos-platform-notification
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-platform-notification"
    packageName: "@mycodexvantaos/platform-notification"
    domain: platform
    lifecycle: stable

  - serviceId: mycodexvantaos-platform-scheduler
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-platform-scheduler"
    packageName: "@mycodexvantaos/platform-scheduler"
    domain: platform
    lifecycle: stable

  - serviceId: mycodexvantaos-platform-observability
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-platform-observability"
    packageName: "@mycodexvantaos/platform-observability"
