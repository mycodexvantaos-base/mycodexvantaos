# catalog/service-catalog.yaml
# Full platform service catalog.
# Based on naming-spec-v1.md 5.1, 7.5, 11

apiVersion: mycodexvantaos.org/v1
kind: ServiceCatalog
metadata:
  name: platform-service-catalog
  labels:
    managed-by: naming-spec-v1

services:
  - serviceId: mycodexvantaos-core-kernel
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-core-kernel"
    packageName: "@mycodexvantaos/core-kernel"
    domain: core
    lifecycle: stable

  - serviceId: mycodexvantaos-core-auth
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-core-auth"
    packageName: "@mycodexvantaos/core-auth"
    domain: core
    lifecycle: stable

  - serviceId: mycodexvantaos-core-gateway
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-core-gateway"
    packageName: "@mycodexvantaos/core-gateway"
    domain: core
    lifecycle: stable

  - serviceId: mycodexvantaos-core-config
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-core-config"
    packageName: "@mycodexvantaos/core-config"
    domain: core
    lifecycle: stable

  - serviceId: mycodexvantaos-ai-embedding
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-ai-embedding"
    packageName: "@mycodexvantaos/ai-embedding"
    domain: ai
    lifecycle: stable

  - serviceId: mycodexvantaos-ai-llm
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-ai-llm"
    packageName: "@mycodexvantaos/ai-llm"
    domain: ai
    lifecycle: stable

  - serviceId: mycodexvantaos-ai-memory
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-ai-memory"
    packageName: "@mycodexvantaos/ai-memory"
    domain: ai
    lifecycle: stable

  - serviceId: mycodexvantaos-ai-agent
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-ai-agent"
    packageName: "@mycodexvantaos/ai-agent"
    domain: ai
    lifecycle: beta

  - serviceId: mycodexvantaos-data-vector-store
    urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-data-vector-store"
    packageName: "@mycodexvantaos/data-vector-store"
    domain: data
