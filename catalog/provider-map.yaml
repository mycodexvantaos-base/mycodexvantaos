# catalog/provider-map.yaml
# Maps capability-id to all registered provider instances.
# Based on naming-spec-v1.md 8
apiVersion: mycodexvantaos.org/v1
kind: ProviderMap
metadata:
  name: platform-provider-map
map:
  database:      [database-postgres, database-sqlite]
  storage:       [storage-s3, storage-minio]
  auth:          [auth-keycloak, auth-jwt-native]
  queue:         [queue-rabbitmq, queue-kafka]
  state-store:   [state-store-redis]
  secrets:       [secrets-vault, secrets-k8s-native]
  repo:          [repo-github]
  deploy:        [deploy-argocd]
  validation:    [validation-zod]
  security:      [security-trivy]
  observability: [observability-opentelemetry, observability-prometheus]
  notification:  [notification-sendgrid]
  scheduler:     [scheduler-temporal]
  vector-store:  [vector-store-pgvector, vector-store-qdrant]
  embedding:     [embedding-openai, embedding-cohere, embedding-ollama]
  llm:           [llm-openai, llm-ollama, llm-anthropic]
  graph:         [graph-neo4j, graph-memgraph]
  cache:         [cache-redis]
  search:        [search-elasticsearch, search-typesense]
