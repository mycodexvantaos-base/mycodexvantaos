# modules/mycodexvantaos-core-auth/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-core-auth
  labels:
    mycodexvantaos.org/domain: core
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: core
  capabilities:
    - auth
    - database
    - cache
    - secrets
  providers:
    auth: auth-keycloak
    database: database-postgres
    cache: cache-redis
    secrets: secrets-vault
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-core-auth"
  packageName: "@mycodexvantaos/core-auth"
  description: "Core authentication and authorization service."
