# modules/mycodexvantaos-docs-search/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-docs-search
  labels:
    mycodexvantaos.org/domain: docs
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: docs
  capabilities:
    - search
    - vector-store
    - embedding
  providers:
    search: search-elasticsearch
    vector-store: vector-store-pgvector
    embedding: embedding-openai
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-docs-search"
  packageName: "@mycodexvantaos/docs-search"
  description: "Full-text and semantic search for platform documentation."
