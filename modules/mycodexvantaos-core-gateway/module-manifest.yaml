# modules/mycodexvantaos-core-gateway/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-core-gateway
  labels:
    mycodexvantaos.org/domain: core
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: core
  capabilities:
    - auth
    - observability
    - cache
  providers:
    auth: auth-keycloak
    observability: observability-opentelemetry
    cache: cache-redis
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-core-gateway"
  packageName: "@mycodexvantaos/core-gateway"
  description: "API gateway. Routing, rate-limiting, and auth middleware."
