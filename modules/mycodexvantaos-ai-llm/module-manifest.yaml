# modules/mycodexvantaos-ai-llm/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-ai-llm
  labels:
    mycodexvantaos.org/domain: ai
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: ai
  capabilities:
    - llm
    - cache
    - observability
  providers:
    llm: llm-openai
    cache: cache-redis
    observability: observability-opentelemetry
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-ai-llm"
  packageName: "@mycodexvantaos/ai-llm"
  description: "Large language model inference and completion service."
