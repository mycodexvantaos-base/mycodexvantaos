# modules/mycodexvantaos-ai-agent/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-ai-agent
  labels:
    mycodexvantaos.org/domain: ai
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: ai
  capabilities:
    - llm
    - embedding
    - vector-store
    - scheduler
  providers:
    llm: llm-openai
    embedding: embedding-openai
    vector-store: vector-store-pgvector
    scheduler: scheduler-temporal
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-ai-agent"
  packageName: "@mycodexvantaos/ai-agent"
  description: "AI agent orchestration. Multi-step reasoning and tool use."
