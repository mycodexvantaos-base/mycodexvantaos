# modules/mycodexvantaos-platform-notification/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-platform-notification
  labels:
    mycodexvantaos.org/domain: platform
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: platform
  capabilities:
    - notification
    - queue
    - observability
  providers:
    notification: notification-sendgrid
    queue: queue-rabbitmq
    observability: observability-opentelemetry
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-platform-notification"
  packageName: "@mycodexvantaos/platform-notification"
  description: "Outbound notification delivery (email, SMS, push)."
