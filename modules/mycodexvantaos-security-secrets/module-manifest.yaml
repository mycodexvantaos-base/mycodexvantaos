# modules/mycodexvantaos-security-secrets/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-security-secrets
  labels:
    mycodexvantaos.org/domain: security
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: security
  capabilities:
    - secrets
    - database
  providers:
    secrets: secrets-vault
    database: database-postgres
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-security-secrets"
  packageName: "@mycodexvantaos/security-secrets"
  description: "Secret and credential management service."
