# modules/mycodexvantaos-data-pipeline/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-data-pipeline
  labels:
    mycodexvantaos.org/domain: data
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: data
  capabilities:
    - database
    - queue
    - storage
    - observability
  providers:
    database: database-postgres
    queue: queue-rabbitmq
    storage: storage-s3
    observability: observability-opentelemetry
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-data-pipeline"
  packageName: "@mycodexvantaos/data-pipeline"
  description: "Data ingestion and transformation pipeline service."
