# modules/mycodexvantaos-ai-memory/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-ai-memory
  labels:
    mycodexvantaos.org/domain: ai
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: ai
  capabilities:
    - vector-store
    - embedding
    - state-store
  providers:
    vector-store: vector-store-pgvector
    embedding: embedding-openai
    state-store: state-store-redis
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-ai-memory"
  packageName: "@mycodexvantaos/ai-memory"
  description: "AI memory service. Stores and retrieves semantic memories."
