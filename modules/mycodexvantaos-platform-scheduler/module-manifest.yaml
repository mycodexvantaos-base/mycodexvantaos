# modules/mycodexvantaos-platform-scheduler/module-manifest.yaml
# 6.3 — metadata.name MUST equal the directory name and service-id exactly (6.4)
apiVersion: mycodexvantaos.org/v1
kind: Module
metadata:
  name: mycodexvantaos-platform-scheduler
  labels:
    mycodexvantaos.org/domain: platform
    mycodexvantaos.org/managed-by: naming-spec-v1
spec:
  domain: platform
  capabilities:
    - scheduler
    - database
    - queue
  providers:
    scheduler: scheduler-temporal
    database: database-postgres
    queue: queue-rabbitmq
  lifecycle:
    stage: stable
    since: "v1.0.0"
  urn: "urn:mycodexvantaos:manifest:service:mycodexvantaos-platform-scheduler"
  packageName: "@mycodexvantaos/platform-scheduler"
  description: "Job scheduling and workflow orchestration service."
