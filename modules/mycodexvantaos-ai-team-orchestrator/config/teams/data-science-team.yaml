# Data Science Team Topology
# Specialized team for ML/AI development and data analysis
urn: urn:mycodexvantaos:team:data-science-team
name: Data Science Team
description: |
  A specialized team focused on machine learning, artificial intelligence,
  and advanced data analytics. Responsible for building ML models,
  data pipelines, and delivering data-driven insights.
type: matrix
version: 1.0.0
created_at: 2024-01-15T10:00:00Z
updated_at: 2024-01-15T10:00:00Z

# Team Topology Configuration
topology_type: matrix
communication_pattern: cross_functional

# Team Members
agents:
  # Lead Data Scientist (Team Lead)
  - agent_urn: urn:mycodexvantaos:agent:data-scientist-01
    role_in_team: lead_data_scientist
    responsibilities:
      - ML strategy
      - Model architecture decisions
      - Team leadership
      - Stakeholder communication
      - Research direction
    expertise:
      - machine_learning
      - deep_learning
      - statistical_modeling
      - python
      - tensorflow
      - pytorch
    governance_tier_override: 2

  # Data Engineer
  - agent_urn: urn:mycodexvantaos:agent:data-engineer-01
    role_in_team: data_engineer
    reports_to: urn:mycodexvantaos:agent:data-scientist-01
    responsibilities:
      - Data pipeline development
      - ETL processes
      - Data warehousing
      - Data quality assurance
    expertise:
      - apache_spark
      - airflow
      - kafka
      - sql
      - python
      - aws_glue
    governance_tier_override: 1

  # ML Engineer
  - agent_urn: urn:mycodexvantaos:agent:ml-engineer-01
    role_in_team: ml_engineer
    reports_to: urn:mycodexvantaos:agent:data-scientist-01
    responsibilities:
      - Model deployment
      - MLOps infrastructure
      - Model monitoring
      - Performance optimization
    expertise:
      - kubernetes
      - docker
      - mlflow
      - sagemaker
      - model_serving
    governance_tier_override: 1

  # Data Analyst
  - agent_urn: urn:mycodexvantaos:agent:analyst-01
    role_in_team: data_analyst
    reports_to: urn:mycodexvantaos:agent:data-scientist-01
    responsibilities:
      - Data analysis
      - Visualization
      - Reporting
      - Business insights
    expertise:
      - sql
      - python
      - tableau
      - power_bi
      - statistics
    governance_tier_override: 0

  # Research Scientist
  - agent_urn: urn:mycodexvantaos:agent:research-scientist-01
    role_in_team: research_scientist
    reports_to: urn:mycodexvantaos:agent:data-scientist-01
    responsibilities:
      - Algorithm research
      - Novel model development
      - Academic collaboration
      - Paper writing
    expertise:
      - deep_learning
      - nlp
      - computer_vision
      - reinforcement_learning
      - research_methodology
    governance_tier_override: 1

# Workflow Definition
workflow_definition:
  id: ml-development-workflow
  type: dag
  nodes:
    # Problem Definition Phase
    - id: problem_definition
      type: task
      action: define_problem
      assigned_to: urn:mycodexvantaos:agent:analyst-01
      config:
        gather_requirements: true
        define_success_metrics: true
    - id: data_assessment
      type: task
      action: assess_data
      assigned_to: urn:mycodexvantaos:agent:data-engineer-01
      dependencies: [problem_definition]
      config:
        check_availability: true
        assess_quality: true
        identify_gaps: true
    - id: hitl_feasibility_review
      type: hitl
      action: review_feasibility
      dependencies: [data_assessment]
      config:
        decision_criteria:
          - data_available
          - feasibility_score
          - resource_available

    # Data Preparation Phase
    - id: data_collection
      type: task
      action: collect_data
      assigned_to: urn:mycodexvantaos:agent:data-engineer-01
      dependencies: [hitl_feasibility_review]
    - id: data_cleaning
      type: task
      action: clean_data
      assigned_to: urn:mycodexvantaos:agent:data-engineer-01
      dependencies: [data_collection]
    - id: feature_engineering
      type: task
      action: engineer_features
      assigned_to: urn:mycodexvantaos:agent:data-scientist-01
      dependencies: [data_cleaning]
    - id: exploratory_analysis
      type: task
      action: explore_data
      assigned_to: urn:mycodexvantaos:agent:analyst-01
      dependencies: [data_cleaning]

    # Model Development Phase (Parallel)
    - id: model_selection
      type: task
      action: select_model
      assigned_to: urn:mycodexvantaos:agent:data-scientist-01
      dependencies: [feature_engineering]
    - id: baseline_model
      type: task
      action: train_baseline
      assigned_to: urn:mycodexvantaos:agent:data-scientist-01
      dependencies: [model_selection]
    - id: advanced_research
      type: task
      action: research_approaches
      assigned_to: urn:mycodexvantaos:agent:research-scientist-01
      dependencies: [model_selection]
    - id: model_training
      type: task
      action: train_model
      assigned_to: urn:mycodexvantaos:agent:data-scientist-01
      dependencies: [baseline_model, advanced_research]
    - id: hyperparameter_tuning
      type: task
      action: tune_hyperparameters
      assigned_to: urn:mycodexvantaos:agent:ml-engineer-01
      dependencies: [model_training]

    # Evaluation Phase
    - id: model_evaluation
      type: task
      action: evaluate_model
      assigned_to: urn:mycodexvantaos:agent:data-scientist-01
      dependencies: [hyperparameter_tuning]
    - id: hitl_model_review
      type: hitl
      action: review_model
      dependencies: [model_evaluation]
      config:
        review_criteria:
          - accuracy_threshold
          - bias_check
          - interpretability

    # Deployment Phase
    - id: model_packaging
      type: task
      action: package_model
      assigned_to: urn:mycodexvantaos:agent:ml-engineer-01
      dependencies: [hitl_model_review]
    - id: deployment_setup
      type: task
      action: setup_deployment
      assigned_to: urn:mycodexvantaos:agent:ml-engineer-01
      dependencies: [model_packaging]
    - id: a_b_testing_setup
      type: task
      action: setup_experiment
      assigned_to: urn:mycodexvantaos:agent:analyst-01
      dependencies: [deployment_setup]
    - id: hitl_production_approval
      type: hitl
      action: approve_production
      dependencies: [a_b_testing_setup]

    # Monitoring Phase
    - id: model_monitoring
      type: task
      action: setup_monitoring
      assigned_to: urn:mycodexvantaos:agent:ml-engineer-01
      dependencies: [hitl_production_approval]
    - id: performance_tracking
      type: task
      action: track_performance
      assigned_to: urn:mycodexvantaos:agent:analyst-01
      dependencies: [model_monitoring]

  edges:
    - from: problem_definition
      to: data_assessment
    - from: data_assessment
      to: hitl_feasibility_review
    - from: hitl_feasibility_review
      to: data_collection
    - from: data_collection
      to: data_cleaning
    - from: data_cleaning
      to: feature_engineering
    - from: data_cleaning
      to: exploratory_analysis
    - from: feature_engineering
      to: model_selection
    - from: model_selection
      to: baseline_model
    - from: model_selection
      to: advanced_research
    - from: baseline_model
      to: model_training
    - from: advanced_research
      to: model_training
    - from: model_training
      to: hyperparameter_tuning
    - from: hyperparameter_tuning
      to: model_evaluation
    - from: model_evaluation
      to: hitl_model_review
    - from: hitl_model_review
      to: model_packaging
    - from: model_packaging
      to: deployment_setup
    - from: deployment_setup
      to: a_b_testing_setup
    - from: a_b_testing_setup
      to: hitl_production_approval
    - from: hitl_production_approval
      to: model_monitoring
    - from: model_monitoring
      to: performance_tracking

# HITL Configuration
hitl_config:
  enabled: true
  checkpoints:
    - node_id: hitl_feasibility_review
      type: feasibility_check
      timeout_seconds: 86400
      approvers:
        - urn:mycodexvantaos:agent:data-scientist-01
      decision_options:
        - proceed
        - request_more_data
        - cancel
    - node_id: hitl_model_review
      type: model_review
      timeout_seconds: 172800
      approvers:
        - urn:mycodexvantaos:agent:data-scientist-01
        - urn:mycodexvantaos:agent:research-scientist-01
      review_checklist:
        - accuracy_meets_threshold
        - no_critical_bias
        - explainability_documented
        - edge_cases_handled
    - node_id: hitl_production_approval
      type: deployment_approval
      timeout_seconds: 86400
      approvers:
        - urn:mycodexvantaos:agent:data-scientist-01
      auto_approve_conditions:
        - is_retraining: true
        - accuracy_improvement: true

# Team Capabilities
capabilities:
  - machine_learning
  - deep_learning
  - natural_language_processing
  - computer_vision
  - time_series_analysis
  - recommendation_systems
  - data_engineering
  - mlops
  - statistical_analysis
  - data_visualization

# ML-Specific Configuration
ml_config:
  experiment_tracking:
    enabled: true
    system: mlflow
  model_registry:
    enabled: true
    system: mlflow
  feature_store:
    enabled: true
    system: feast
  compute_resources:
    training:
      gpu_required: true
      min_memory_gb: 32
    inference:
      cpu_only: false
      auto_scaling: true
  reproducibility:
    random_seed: 42
    version_control: true
    environment_freezing: true

# Data Governance
data_governance:
  privacy:
    pii_handling: strict
    anonymization_required: true
  quality:
    min_data_quality_score: 0.95
    validation_rules: enabled
  lineage:
    tracking_enabled: true
    audit_trail: true
  retention:
    raw_data_days: 365
    processed_data_days: 730

# Team Schedule
schedule:
  timezone: UTC
  working_hours:
    start: "09:00"
    end: "18:00"
  training_windows:
    allowed_days: [saturday, sunday]
    max_duration_hours: 48
  inference:
    availability_sla: 99.9

# Performance Metrics
metrics:
  model_performance:
    - accuracy
    - precision
    - recall
    - f1_score
    - auc_roc
  operational:
    - training_duration
    - inference_latency
    - model_drift_score
    - feature_drift_score
  business:
    - model_impact_metric
    - prediction_volume
    - user_adoption_rate

# Communication Channels
channels:
  - type: slack
    channels:
      - "#data-science"
      - "#ml-ops"
    purpose: daily_communication
  - type: jupyter
    purpose: notebook_collaboration
  - type: github
    repository: org/ml-models
    purpose: code_versioning
  - type: wandb
    purpose: experiment_tracking
  - type: confluence
    space: DATA-SCI
    purpose: documentation