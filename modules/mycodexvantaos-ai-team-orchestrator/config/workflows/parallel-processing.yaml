# Parallel Processing Workflow Pattern
# Designed for independent tasks that can be executed concurrently
urn: urn:mycodexvantaos:workflow:parallel-processing
name: Parallel Processing Workflow
description: |
  A workflow pattern for executing multiple independent tasks in parallel.
  Best suited for tasks with no inter-dependencies that can benefit from
  concurrent execution to reduce overall completion time.
type: dag
version: 1.0.0
created_at: 2024-01-15T10:00:00Z
updated_at: 2024-01-15T10:00:00Z

# Workflow Configuration
config:
  max_parallel_tasks: 5
  timeout_seconds: 3600
  retry_policy:
    max_retries: 3
    backoff_seconds: 10
  error_handling: fail_fast  # fail_fast, continue_on_error, collect_errors

# DAG Nodes Definition
nodes:
  # Entry point - Initialize the workflow
  - id: initialize
    type: task
    action: initialize_workflow
    config:
      validate_inputs: true
      setup_context: true
    handler: initializeHandler
    next:
      - split_tasks

  # Split tasks for parallel execution
  - id: split_tasks
    type: router
    action: split_into_subtasks
    config:
      strategy: parallel
      max_splits: 10
      balance_load: true
    handler: splitHandler
    next:
      - parallel_task_1
      - parallel_task_2
      - parallel_task_3
      - parallel_task_4
      - parallel_task_5

  # Parallel execution tasks
  - id: parallel_task_1
    type: task
    action: execute_parallel
    config:
      task_index: 1
      timeout_seconds: 600
    dependencies:
      - split_tasks
    handler: parallelTaskHandler
    next:
      - aggregate_results

  - id: parallel_task_2
    type: task
    action: execute_parallel
    config:
      task_index: 2
      timeout_seconds: 600
    dependencies:
      - split_tasks
    handler: parallelTaskHandler
    next:
      - aggregate_results

  - id: parallel_task_3
    type: task
    action: execute_parallel
    config:
      task_index: 3
      timeout_seconds: 600
    dependencies:
      - split_tasks
    handler: parallelTaskHandler
    next:
      - aggregate_results

  - id: parallel_task_4
    type: task
    action: execute_parallel
    config:
      task_index: 4
      timeout_seconds: 600
    dependencies:
      - split_tasks
    handler: parallelTaskHandler
    next:
      - aggregate_results

  - id: parallel_task_5
    type: task
    action: execute_parallel
    config:
      task_index: 5
      timeout_seconds: 600
    dependencies:
      - split_tasks
    handler: parallelTaskHandler
    next:
      - aggregate_results

  # Aggregate all parallel results
  - id: aggregate_results
    type: aggregator
    action: combine_results
    config:
      wait_for_all: true
      merge_strategy: concat
      deduplicate: true
    dependencies:
      - parallel_task_1
      - parallel_task_2
      - parallel_task_3
      - parallel_task_4
      - parallel_task_5
    handler: aggregateHandler
    next:
      - finalize

  # Finalize workflow
  - id: finalize
    type: task
    action: finalize_workflow
    config:
      cleanup: true
      generate_report: true
    dependencies:
      - aggregate_results
    handler: finalizeHandler

# Edge Definitions
edges:
  - from: initialize
    to: split_tasks
  - from: split_tasks
    to: parallel_task_1
  - from: split_tasks
    to: parallel_task_2
  - from: split_tasks
    to: parallel_task_3
  - from: split_tasks
    to: parallel_task_4
  - from: split_tasks
    to: parallel_task_5
  - from: parallel_task_1
    to: aggregate_results
  - from: parallel_task_2
    to: aggregate_results
  - from: parallel_task_3
    to: aggregate_results
  - from: parallel_task_4
    to: aggregate_results
  - from: parallel_task_5
    to: aggregate_results
  - from: aggregate_results
    to: finalize

# HITL Configuration
hitl_config:
  enabled: false  # No human intervention needed for pure parallel processing

# Metrics and Monitoring
metrics:
  track_per_node: true
  aggregate_metrics:
    - total_execution_time
    - parallel_efficiency
    - task_success_rate
    - resource_utilization

# Example Usage
examples:
  - name: Data Processing Pipeline
    description: Process multiple data files concurrently
    input:
      files:
        - data/file1.csv
        - data/file2.csv
        - data/file3.csv
    expected_output:
      processed_files: 3
      total_records: 10000

  - name: API Aggregation
    description: Fetch data from multiple APIs in parallel
    input:
      apis:
        - url: https://api.example1.com/data
        - url: https://api.example2.com/data
        - url: https://api.example3.com/data
    expected_output:
      aggregated_data: combined_response