# governance/provider-registry.yaml
# Registered provider instances for mycodexvantaos platform.
# Based on naming-spec-v1.md 8.1, 8.2
# Format: <capability-id>-<provider-name>
# Rule: capability segment MUST come first. Provider name MUST NOT be used as capability-id.

apiVersion: mycodexvantaos.org/v1
kind: ProviderRegistry
metadata:
  name: platform-provider-registry
  labels:
    managed-by: naming-spec-v1
    specRef: "8"

providers:
  # capability: database
  - name: database-postgres
    capability: database
    providerName: postgres
    isNative: false
    lifecycle: stable

  - name: database-sqlite
    capability: database
    providerName: sqlite
    isNative: true
    lifecycle: stable

  # capability: vector-store
  - name: vector-store-pgvector
    capability: vector-store
    providerName: pgvector
    isNative: false
    lifecycle: stable

  - name: vector-store-qdrant
