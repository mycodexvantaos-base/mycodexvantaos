    isNative: false
    lifecycle: stable

  # capability: llm
  - name: llm-openai
    capability: llm
    providerName: openai
    isNative: false
    lifecycle: stable

  - name: llm-ollama
    capability: llm
    providerName: ollama
    isNative: true
    lifecycle: stable

  - name: llm-anthropic
    capability: llm
    providerName: anthropic
    isNative: false
    lifecycle: beta

  # capability: embedding
