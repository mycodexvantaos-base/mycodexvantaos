# =============================================================================
# mycodexvantaos-全域治理整合規格
# 檔案路徑 : governance/platform-governance-spec.yaml
# 版本     : v1.0.0-quantum-weight-aware
# 日期     : 2026-04-23
# 狀態     : immutable (sealed 2026-01-01T00:00:00Z)
# =============================================================================

id: "mycodexvantaos-platform-governance"
spec_version: "v1.0.0"
effective_date: "2026-04-23T00:00:00Z"
immutable_after: "2026-01-01T00:00:00Z"
status: "stable"
enforce_level: "mandatory"

# =============================================================================
# A. 平台身份錨點
# =============================================================================
identity:
  org_identity: "mycodexvantaos"
  root_prefix: "mycodexvantaos"
  backend_prefix: "mycodexvantaos-quantum"
  npm_scope: "@mycodexvantaos"
  urn_namespace: "urn:mycodexvantaos"
  internal_scheme: "mycodexvantaos://"
  oci_registry_org: "mycodexvantaos"
  k8s_api_group: "mycodexvantaos.quantum"
  crd_group: "mycodexvantaos.quantum"

  namespace_lexicon:
    mycodexvantaos:
      role: "核心基礎設施 / 共享服務 / 控制平面"
      scope: "底層平台組件，為上層業務平台提供支撐"
      examples:
        - "mycodexvantaos-auth"
        - "mycodexvantaos-policy"
        - "mycodexvantaos-quantum-controller"
    softwareos:
      role: "業務平台命名空間"
      scope: "上層業務應用，依賴 mycodexvantaos 提供的基礎服務"
      note: "保留為業務平台獨立分層，不得與 mycodexvantaos 混用"

  forbidden_legacy_prefixes:
    - "mycodexvanta-os"
    - "codexvanta-os"
    - "codexvanta"
    - "KUBO"
    - "kubo"
    - "codevantaos"
  forbidden_legacy_regex: "^(mycodexvanta-os|codexvanta|codexvanta-os|[Kk][Uu][Bb][Oo]|codevantaos)"
  migration_script: "scripts/rename-mycodexvantaos.sh"
  scan_script: "scripts/check-legacy-prefix.sh"

# =============================================================================
# B. 三層命名閉環模型
# =============================================================================
naming_closure_model:
  name: "mycodexvantaos Naming Closure Model"
  version: "v3.0"
  termination_layers: 3
  recursion_prevention: "有限層級終止 + L2 物理多簽變更鎖"

  L0_atomic:
    layer_id: "L0"
    label: "原子命名層"
    mutability: "immutable"
    change_mechanism: "系統重生事件（非常規流程不可觸發）"
    source_doc: "governance/naming-closure/L0-atomic-categories.yaml"
    atomic_category_count: 32
    atomic_categories:
      infrastructure:
        - "platform"
        - "service"
        - "api"
        - "component"
        - "port"
        - "dns"
      development:
        - "module"
        - "directory"
        - "file"
        - "dependency"
        - "branch"
        - "tag"
      organization:
        - "team"
        - "org"
        - "enterprise"
      semantic_governance:
        - "semantic-anchor"
        - "governance-rule"
        - "event-stream"
        - "archive-evidence"
        - "spec-doc"
        - "path"
        - "mapping"
        - "reference"
        - "metadata"
        - "annotation"
      technical_closure:
        - "error"
        - "state"
        - "transition"
        - "policy"
        - "metric"
        - "contract"
      meta:
        - "meta-naming"     # 終止遞歸的自指涉類別

  L1_normative:
    layer_id: "L1"
    label: "規範命名層"
    mutability: "requires_L2_reference"
    source_doc: "governance/naming-closure/L1-specs/"
    spec_file_pattern: "mycodexvantaos_spec_{category}_v{semver}.yaml"
    spec_count: 32
    canonical_identifier_rules:
      spec_key: "canonical_identifiers"
    composite_identifier_rules:
      spec_key: "composite_identifiers"
    protocol_specific_rules:
      spec_key: "protocol_specific_identifiers"

  L2_meta:
    layer_id: "L2"
    label: "元命名層（終止點）"
    mutability: "requires_physical_multisig"
    multisig_threshold: "3/5"
    multisig_method: "hardware_security_module"
    source_doc: "governance/naming-closure/L2-meta/meta_naming_spec_v1.yaml"
    defines:
      - "規範文件命名規則"
      - "規範版本策略（強制 SemVer 2.0.0）"
      - "L2 自身變更的權限閉環"

  closure_prover:
    class: "NamingClosureProver"
    source_file: "ci/utils/naming-closure-prover.ts"
    assertions:
      completeness: "has_category_for_all_names()"
      consistency: "naming_spec_is_named()"
      termination: "no_undefined_dependencies() && has_termination_layer()"
      self_reference: "L2_change_mechanism_is_defined()"
    output:
      type: "formal_proof"
      archive_namespace: "archive-evidence"   # L0 atomic category
      replay_enabled: true

# =============================================================================
# C. 命名空間治理編碼體系（Era 層級）
# =============================================================================
