# =============================================================================
# D. Canonical Identifiers
# =============================================================================
canonical_identifiers:

  service_id:
    format: "mycodexvantaos-<domain>-<capability>[-<sub_capability>]"
    regex: "^mycodexvantaos-[a-z0-9]+(?:-[a-z0-9]+)+$"
    ci_rule_file: "ci/rules/service-id.rule.ts"
    enforcement: "hard"
    constraints:
      - "必須以 mycodexvantaos- 為前綴"
      - "domain + capability 至少兩段"
      - "不含版本號"
      - "不含環境標記"
    valid_examples:
      - "mycodexvantaos-ai-embedding"
      - "mycodexvantaos-core-auth"
      - "mycodexvantaos-quantum-controller"
    invalid_examples:
      - { value: "mycodexvantaos-ai",              reason: "僅一段 domain" }
      - { value: "mycodexvantaos-ai-embedding-v2", reason: "含版本號" }
      - { value: "mycodexvantaos-ai-embedding-prod", reason: "含環境標記" }
      - { value: "mycodexvantaos_ai_embedding",    reason: "底線不允許" }

  package_short_id:
    format: "<domain>-<capability>[-<sub_capability>]"
    derivation: "service_id.removePrefix('mycodexvantaos-')"
    regex: "^[a-z0-9]+(?:-[a-z0-9]+)+$"

  k8s_resource_name:
    derivation: "service_id"
    note: "所有 base manifest 的 metadata.name 嚴格等於 service_id"
    ci_rule_file: "ci/rules/manifest-name.rule.ts"
    enforcement: "hard"

  canonical_capability_set:
    source_of_truth: "governance/capability-set.yaml"
    ci_rule_file: "ci/rules/capability-id.rule.ts"
    enforcement: "hard"
    regex: >
      ^(database|storage|auth|queue|state-store|secrets|repo|deploy|
      validation|security|observability|notification|scheduler|vector-store|
      embedding|llm|graph|cache|search|ai-ethics|blockchain|event-stream)$
    values:
      - "database"
      - "storage"
      - "auth"
      - "queue"
      - "state-store"
      - "secrets"
      - "repo"
      - "deploy"
      - "validation"
      - "security"
      - "observability"
      - "notification"
      - "scheduler"
      - "vector-store"
      - "embedding"
      - "llm"
      - "graph"
      - "cache"
      - "search"
      - "ai-ethics"
      - "blockchain"
      - "event-stream"

# =============================================================================
# E. Protocol-Specific Identifiers
# =============================================================================
protocol_specific_identifiers:

  package_name:
    format: "@mycodexvantaos/<package_short_id>"
    regex: "^@mycodexvantaos/[a-z0-9]+(?:-[a-z0-9]+)+$"
    ci_rule_file: "ci/rules/package-name.rule.ts"
    enforcement: "hard"

  env_var:
    format: "MYCODEXVANTAOS_<SUBSYSTEM>_<KEY>"
    regex: "^MYCODEXVANTAOS_[A-Z0-9_]+$"
    forbidden_prefix: "ORCH_"
    ci_rule_file: "ci/rules/env-var.rule.ts"
    enforcement: "hard"
    valid_examples:
      - "MYCODEXVANTAOS_DATABASE_URL"
      - "MYCODEXVANTAOS_AUTH_JWT_SECRET"
      - "MYCODEXVANTAOS_QUANTUM_MODE"
    invalid_examples:
      - { value: "DATABASE_URL",           reason: "缺少 MYCODEXVANTAOS_ 前綴" }
      - { value: "ORCH_DATABASE_URL",      reason: "舊前綴禁用" }
      - { value: "KUBO_MODE",              reason: "遺留前綴禁用" }
      - { value: "MYCODEXVANTAOS_MODE",    note: "MYCODEXVANTAOS_MODE 為合法替代 KUBO_MODE" }

  urn:
    format: "urn:mycodexvantaos:<type>:<subtype>:<identifier>"
    regex: "^urn:mycodexvantaos:[a-z-]+:[a-z-]+:[a-z0-9-]+$"
    ci_rule_file: "ci/rules/urn.rule.ts"
    enforcement: "hard"
    examples:
      - "urn:mycodexvantaos:manifest:service:mycodexvantaos-ai-embedding"
      - "urn:mycodexvantaos:capability:vector-store:pgvector"

  internal_uri:
    format: "mycodexvantaos://<namespace>/<type>/<id>"
    examples:
      - "mycodexvantaos://platform/service/mycodexvantaos-core-kernel"

# =============================================================================
# F. Provider Identifiers
# =============================================================================
provider_identifiers:
  provider_instance:
    format: "<capability>-<provider>"
    order: "capability FIRST, provider SECOND — never inverted"
    regex: >
      ^(database|storage|auth|queue|state-store|secrets|repo|deploy|
      validation|security|observability|notification|scheduler|vector-store|
      embedding|llm|graph|cache|search|ai-ethics|blockchain|event-stream)-[a-z0-9-]+$
    ci_rule_file: "ci/rules/provider-instance.rule.ts"
    enforcement: "hard"
    source_of_truth: "governance/provider-registry.yaml"
    directory_pattern: "providers/<capability>/<capability>-<provider>/provider-manifest.yaml"
    valid_examples:
      - "vector-store-pgvector"
      - "database-postgres"
      - "llm-openai"
    invalid_examples:
      - { value: "postgres-database", reason: "順序倒置" }
      - { value: "openai-llm",        reason: "順序倒置" }

# =============================================================================
# G. Composite Identifiers
# =============================================================================
composite_identifiers:
  separator: "--"
  rule: "雙連字號僅用於 composite；不得出現在 canonical identifier 中"

  definitions:
    vector_collection:
      format: "<service-id>--<purpose>--<model-alias>"
      regex: "^mycodexvantaos-[a-z0-9]+(?:-[a-z0-9]+)+--[a-z0-9-]+--[a-z0-9-]+$"
      directory: "vector-store/collections/<id>.yaml"
      ci_rule_file: "ci/rules/vector-collection.rule.ts"
      enforcement: "soft"
      example: "mycodexvantaos-memory--docs--bge-small-384"

    embedding_model_alias:
      format: "<provider>--<model>--<dim>d"
      regex: "^[a-z0-9-]+--[a-z0-9-]+--[0-9]+d$"
      directory: "vector-store/embedding-model-aliases/<alias>.yaml"
      ci_rule_file: "ci/rules/embedding-model-alias.rule.ts"
      enforcement: "soft"
      example: "openai--text-embedding-3-small--1536d"

    retrieval_pipeline_id:
      format: "retrieval--<strategy>--<store>"
      regex: "^retrieval--[a-z0-9-]+--[a-z0-9-]+$"
      directory: "vector-store/retrieval-pipelines/<id>.yaml"
      ci_rule_file: "ci/rules/retrieval-pipeline-id.rule.ts"
      enforcement: "soft"
      example: "retrieval--hybrid--pgvector"

    search_index_id:
      format: "idx--<service-id>--<field>--<analyzer>"
      regex: "^idx--mycodexvantaos-[a-z0-9]+(?:-[a-z0-9]+)+--[a-z0-9-]+--[a-z0-9-]+$"
      directory: "search-indexes/<id>.yaml"
      ci_rule_file: "ci/rules/search-index-id.rule.ts"
      enforcement: "soft"
      example: "idx--mycodexvantaos-docs-search--content--cjk"

    graph_node_id:
      format: "<service-id>--<entity>--<natural-key>"
      regex: "^mycodexvantaos-[a-z0-9]+(?:-[a-z0-9]+)+--[a-z0-9-]+--[a-z0-9-]+$"
      ci_rule_file: "ci/rules/graph-node-id.rule.ts"
      enforcement: "soft"
      example: "mycodexvantaos-core-kernel--user--alice"

    graph_db_index_id:
      format: "graph-idx--<service-id>--<label>--<property>"
      regex: "^graph-idx--mycodexvantaos-[a-z0-9]+(?:-[a-z0-9]+)+--[a-z0-9-]+--[a-z0-9-]+$"
      directory: "knowledge-graph/indexes/<id>.yaml"
      ci_rule_file: "ci/rules/graph-db-index-id.rule.ts"
      enforcement: "soft"
      example: "graph-idx--mycodexvantaos-governance--policy--name"

    timestamped_id:
      format: "<prefix>--<YYYYMMDD>--<random6>"
      regex: "^[a-z0-9-]+--[0-9]{8}--[a-z0-9]{6}$"
      ci_rule_file: "ci/rules/timestamped-id.rule.ts"
      enforcement: "soft"
      example: "job--20260423--a1b2c3"

    content_addressed_id:
      format: "<prefix>--sha256-<first12hex>"
      regex: "^[a-z0-9-]+--sha256-[a-f0-9]{12}$"
      ci_rule_file: "ci/rules/content-addressed-id.rule.ts"
      enforcement: "soft"
      example: "dataset--sha256-3f4a8b9c1d2e"

    uuid_based_id:
      format: "<prefix>--<uuid-nodash>"
      regex: "^[a-z0-9-]+--[a-f0-9]{32}$"
      ci_rule_file: "ci/rules/uuid-based-id.rule.ts"
      enforcement: "soft"
      example: "session--550e8400e29b41d4a716446655440000"

    exception_record_id:
      format: "exception--<YYYYMMDD>--<random6>"
      regex: "^exception--[0-9]{8}--[a-z0-9]{6}$"
      directory: "governance/exceptions.yaml"
      note: "例外登錄記錄的唯一識別符"

# =============================================================================
# H. 路徑推導規則（機械推導，禁止手動別名）
# =============================================================================
path_derivation:
  rule: "所有路徑由 service_id 機械推導；禁止手動自訂別名"
  source_of_truth: "ci/utils/service-id-parser.ts"
  ci_rule_file: "ci/rules/module-path.rule.ts"
  enforcement: "hard"

  derivations:
    service_path:
      formula: "services/{service_id}/"
      example: "services/mycodexvantaos-ai-embedding/"
    module_path:
      formula: "modules/{service_id}/"
      example: "modules/mycodexvantaos-ai-embedding/"
    manifest_path:
      formula: "modules/{service_id}/module-manifest.yaml"
      example: "modules/mycodexvantaos-ai-embedding/module-manifest.yaml"
    package_short_id:
      formula: "service_id.removePrefix('mycodexvantaos-')"
      example: "ai-embedding"
    package_name:
      formula: "@mycodexvantaos/{package_short_id}"
      example: "@mycodexvantaos/ai-embedding"
    k8s_logical_name:
      formula: "{service_id}"
      example: "mycodexvantaos-ai-embedding"
    k8s_base_path:
      formula: "infra/kubernetes/base/{service_id}/"
