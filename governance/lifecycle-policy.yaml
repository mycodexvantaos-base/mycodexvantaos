# governance/lifecycle-policy.yaml
# Lifecycle stage transition policy for mycodexvantaos platform.
# Based on naming-spec-v1.md 11

apiVersion: mycodexvantaos.org/v1
kind: LifecyclePolicy
metadata:
  name: platform-lifecycle-policy
  labels:
    managed-by: naming-spec-v1
    specRef: "11"

policy:
  stages:
    experimental:
      description: >
        Exploratory feature. API surface may change without notice.
        Not suitable for production workloads.
      allowedTransitions: [alpha, archived]
      requiresApproval: false

    alpha:
      description: >
        Internal testing stage. Functionality is complete but stability
        is not guaranteed. Breaking changes may occur.
      allowedTransitions: [beta, archived]
      requiresApproval: false

    beta:
      description: >
        Public testing stage. Feature-complete with possible minor adjustments.
        Suitable for non-critical workloads.
      allowedTransitions: [stable, deprecated]
      requiresApproval: true
      approvalBody: arch-committee

    stable:
      description: >
        Production-ready. Follows semantic versioning. Breaking changes
        require a major version bump and a deprecation window.
      allowedTransitions: [deprecated]
      requiresApproval: true
      approvalBody: arch-committee
      minimumDeprecationWindowDays: 90

    deprecated:
      description: >
        Scheduled for removal. Consumers must migrate to the replacement.
        A replacement URN and replacementVersion MUST be specified in the manifest.
      allowedTransitions: [archived]
      requiresApproval: false
      replacementRequired: true

    archived:
      description: >
        No longer maintained. Available for historical reference only.
        No further transitions allowed.
      allowedTransitions: []
      requiresApproval: false

  versioningRules:
    format: semver-2.0.0
    note: >
      Version tags (v1.2.3, v2.0.0-beta.1) are used ONLY in tags, releases,
      and metadata. They MUST NOT appear in canonical identifiers (3.6).

  replacementRules:
    note: >
      Replacement references MUST point to a version-free canonical identifier
      or URN (11.3). Version is carried separately in replacementVersion field.
    validReplacementFormat: "urn:mycodexvantaos:<type>:<subtype>:<identifier>"
    invalidReplacementExample: "urn:mycodexvantaos:service:mycodexvantaos-core-kernel-v2"
